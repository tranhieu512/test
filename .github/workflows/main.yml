name: Auto Update MIN (Python) 🔄

# Cấu hình các Trigger (Sự kiện kích hoạt)
on:
  # Chạy mỗi 1 giờ
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: {}

env:
  TZ: Asia/Ho_Chi_Minh

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 
          
      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        # Cần cài đặt thư viện 'requests' để script tải các nguồn M3U
        run: pip install requests
        
      - name: ⚙️ Run Python script (Process M3U)
        # Chạy script Python để tải, lọc và tạo file MIN.m3u
        run: python scripts/process.py
        
      - name: ⏱️ GetTime for Commit Message
        run: echo "DATE=$(date +'%Y-%m-%d %H:%M:%S GMT+7')" >> $GITHUB_ENV
        
      # Bước này thay thế hoàn toàn cho bước 'Clean' và 'Push' phức tạp cũ
      - name: ⬆️ Commit and Push Updated M3U
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          file_pattern: min
          #file_pattern: MIN.m3u MIN.txt
          commit_message: "Auto Update in ${{ env.DATE }}!✨MIN✨!"
